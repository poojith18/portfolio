<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      var segment = window.location.pathname.replace(/^\/portfolio\/?/, "");
      var hash = window.location.hash || "#/";
      window.location.replace("/portfolio/" + (segment ? segment : "") + hash);
    </script>
  </head>
  <body></body>
</html>
